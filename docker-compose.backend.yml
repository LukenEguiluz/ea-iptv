# Solo backend + PostgreSQL (frontend en Vercel u otro host).
# Uso: docker compose -f docker-compose.backend.yml up -d --build
#
# Expone API en :8000 — pon nginx/Caddy delante con HTTPS y define GATEWAY_PUBLIC_URL en .env

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: iptv_gateway
      POSTGRES_USER: iptv_gateway
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iptv_gateway_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iptv_gateway -d iptv_gateway"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: iptv_gateway
      POSTGRES_USER: iptv_gateway
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-iptv_gateway_secret}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-change-in-production}
      DEBUG: ${DEBUG:-False}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      GATEWAY_PUBLIC_URL: ${GATEWAY_PUBLIC_URL:-}
      IPTV_ENCRYPTION_KEY: ${IPTV_ENCRYPTION_KEY:-}
      SESSION_INACTIVITY_MINUTES: ${SESSION_INACTIVITY_MINUTES:-5}
      XTREAM_SERVER_URL: ${XTREAM_SERVER_URL:-}
      IPTV_ACCOUNT_LUKEN_USERNAME: ${IPTV_ACCOUNT_LUKEN_USERNAME:-}
      IPTV_ACCOUNT_LUKEN_PASSWORD: ${IPTV_ACCOUNT_LUKEN_PASSWORD:-}
      IPTV_ACCOUNT_REBE_USERNAME: ${IPTV_ACCOUNT_REBE_USERNAME:-}
      IPTV_ACCOUNT_REBE_PASSWORD: ${IPTV_ACCOUNT_REBE_PASSWORD:-}
      IPTV_ACCOUNT_HELIOS_USERNAME: ${IPTV_ACCOUNT_HELIOS_USERNAME:-}
      IPTV_ACCOUNT_HELIOS_PASSWORD: ${IPTV_ACCOUNT_HELIOS_PASSWORD:-}
      IPTV_ACCOUNT_CARMEN_USERNAME: ${IPTV_ACCOUNT_CARMEN_USERNAME:-}
      IPTV_ACCOUNT_CARMEN_PASSWORD: ${IPTV_ACCOUNT_CARMEN_PASSWORD:-}
      IPTV_ACCOUNT_ARTURO_USERNAME: ${IPTV_ACCOUNT_ARTURO_USERNAME:-}
      IPTV_ACCOUNT_ARTURO_PASSWORD: ${IPTV_ACCOUNT_ARTURO_PASSWORD:-}
      IPTV_USER_LUKEN_PASSWORD: ${IPTV_USER_LUKEN_PASSWORD:-}
      IPTV_USER_REBE_PASSWORD: ${IPTV_USER_REBE_PASSWORD:-}
      IPTV_USER_HELIOS_PASSWORD: ${IPTV_USER_HELIOS_PASSWORD:-}
      IPTV_USER_CARMEN_PASSWORD: ${IPTV_USER_CARMEN_PASSWORD:-}
      IPTV_USER_ARTURO_PASSWORD: ${IPTV_USER_ARTURO_PASSWORD:-}
      CATALOG_SYNC_INTERVAL_HOURS: ${CATALOG_SYNC_INTERVAL_HOURS:-4}
      CATALOG_SYNC_CATEGORY_WORKERS: ${CATALOG_SYNC_CATEGORY_WORKERS:-10}
      CATALOG_SYNC_ACCOUNT_WORKERS: ${CATALOG_SYNC_ACCOUNT_WORKERS:-5}
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME:-}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL:-}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
