# Proxy HTTP para bypass Xtream vía ZeroTier (EA_VPN).
# Solo acepta clientes de la red virtual 10.234.232.0/24 (+ localhost para pruebas).

User tinyproxy
Group tinyproxy
Port 8888
Listen 0.0.0.0

Allow 127.0.0.1
Allow 10.234.232.0/24

Timeout 600
MaxClients 64
MinSpareServers 2
MaxSpareServers 8

ConnectPort 443
ConnectPort 563
ConnectPort 80
ConnectPort 8080
